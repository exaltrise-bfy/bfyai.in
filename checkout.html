<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — BFYAI</title>
  <meta name="description" content="Secure subscription checkout for BFYAI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/jpeg" href="images/bfy-logo.jpg" />
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="page-checkout">
  <a class="skip-link" href="#checkout-main">Skip to checkout</a>
  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="logo logo-wordmark" aria-label="BFYAI home">BFYAI</a>
      <nav class="site-nav site-nav--simple" aria-label="Checkout">
        <a href="index.html">Back to site</a>
      </nav>
    </div>
  </header>

  <main id="checkout-main" class="checkout-main">
    <div class="checkout-card">
      <h1>Secure checkout</h1>
      <p class="checkout-lead">Complete payment for your plan. Open this page from your app-issued link so your session token is included.</p>
      <p id="statusText" class="muted">Preparing session...</p>
      <div id="summary" class="summary" hidden></div>
      <div class="checkout-actions">
        <button id="payBtn" class="btn btn-primary" type="button" disabled>Pay now</button>
        <a href="index.html" class="btn btn-ghost">Back</a>
      </div>
    </div>
  </main>

  <footer class="site-footer checkout-footer">
    <div class="container footer-wrap">
      <p class="footer-copy">&copy; <span id="year"></span> BFYAI</p>
    </div>
  </footer>

  <script>
    (function () {
      var y = document.getElementById("year");
      if (y) y.textContent = String(new Date().getFullYear());
    })();

    const API_BASE = "https://api.callmanager.app";

    const params = new URLSearchParams(window.location.search);
    const token = (params.get("token") || "").trim();
    const statusText = document.getElementById("statusText");
    const summary = document.getElementById("summary");
    const payBtn = document.getElementById("payBtn");
    let session = null;

    function setStatus(msg, type = "muted") {
      statusText.className = type;
      statusText.textContent = msg;
    }

    async function post(path, body) {
      const r = await fetch(`${API_BASE}${path}`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        const t = await r.text();
        throw new Error(t || `Request failed: ${r.status}`);
      }
      return r.json();
    }

    async function loadSession() {
      if (!token) {
        setStatus("Missing token. Please open checkout from the app.", "err");
        return;
      }
      try {
        const data = await post("/api/v1/payments/checkout/session", {token});
        session = data;
        summary.hidden = false;
        summary.textContent = `Plan: ${data.plan} | Amount: ${(data.amount / 100).toFixed(2)} ${data.currency}`;
        payBtn.disabled = false;
        setStatus("Ready to pay.");
      } catch (e) {
        setStatus(`Session invalid or expired. ${String(e.message || e)}`, "err");
      }
    }

    async function verifyAndFinish(result) {
      try {
        setStatus("Verifying payment...");
        await post("/api/v1/payments/checkout/verify-token", {
          token,
          razorpay_order_id: result.razorpay_order_id,
          razorpay_payment_id: result.razorpay_payment_id,
          razorpay_signature: result.razorpay_signature,
        });
        setStatus("Payment successful.", "ok");
      } catch (e) {
        setStatus(`Payment verification failed. ${String(e.message || e)}`, "err");
      }
    }

    function openCheckout() {
      if (!session) return;
      const rz = new Razorpay({
        key: session.key_id,
        amount: session.amount,
        currency: session.currency,
        order_id: session.order_id,
        name: "CallManager Assistant",
        description: `${session.plan} plan`,
        prefill: {
          name: session.name || "",
          email: session.email || "",
          contact: session.contact || "",
        },
        handler: verifyAndFinish,
        theme: {color: "#fafafa"},
        modal: {
          ondismiss: function () {
            setStatus("Payment cancelled.", "muted");
          },
        },
      });
      rz.open();
    }

    payBtn.addEventListener("click", openCheckout);
    loadSession();
  </script>
</body>
</html>
